fileType: momentic/test/v2
id: 3a6f5e90-1d44-4b7c-8e22-9f0b7c61a2d8
version: 1.0.24
url: https://wekbench.com/c/c_invalidtokendoesnotexist000
description: Clarification technical — invalid token rejected, and a real no-login round-trip persists
# P1. Guards the public tokenized clarification page. Deterministic steps, low AI cost.
disabled: false
retries: 1
viewport: 1920, 1080
browserType: Chromium
steps:
  # A. Invalid token → friendly "not available" with NO login and NO leaked data.
  - wait: 2500
  - assert: >-
      A friendly "Clarification not available" state is shown (the link is invalid or not
      yet shared) — NOT an error page, a blank screen, a sign-in form, or any quote /
      clarification data.

  # B. Real no-login round-trip. Sign in only to generate a clarification + token.
  - navigate: https://wekbench.com/signin
  - wait: 1500
  - type:
      text: "{{ env.WEKBENCH_EMAIL_TEST }}"
      into: the work email field
  - type:
      text: "{{ env.WEKBENCH_PASSWORD_TEST }}"
      into: the password field
  - click: the button to continue / sign in with work email
  - waitForUrlNotToMatch: signin
  - wait: 2500

  - javascript:
      code: |-
        const stamp = Date.now();
        setVariable("QUOTE_TITLE", "QA Clar Tech " + stamp);
        setVariable("BUYER_NAME", "QA Buyer " + stamp);
        return stamp;
      saveAs: STAMP_RET

  # Create a fresh quote (deterministic dialog fill).
  - navigate: https://wekbench.com/quotes?new=1
  - wait: 8000
  - type:
      text: "{{ env.QUOTE_TITLE }}"
      into: the quote title field (placeholder "e.g. Office laptops for Q3")
  - click: the "Select a buyer" dropdown
  - click: the "Create new buyer" option in the dropdown
  - type:
      text: "{{ env.BUYER_NAME }}"
      into: the "New buyer company name" field
  - click: the "Add" button next to the new buyer name field
  - wait: 1200
  - click: the "Create & open" button
  - wait: 3500

  # Start a clarification, add a question, send (deterministic).
  - click: the "Start clarification" button in the Buyer clarification section
  - wait: 1500
  - type:
      text: Please confirm the required voltage rating.
      into: the input for adding a clarification question
  - click: the "Add" button next to the clarification question input
  - wait: 1000
  - click: the "Send to buyer" button
  - wait: 2500

  # Capture the public buyer link the panel rendered.
  - javascript:
      code: |-
        const a = document.querySelector('a[href^="/c/"]');
        const path = a ? a.getAttribute('href') : '';
        setVariable("CLAR_PATH", path);
        return path;
      saveAs: CLAR_PATH_RET

  # Open the public page (no login) and answer (deterministic).
  - navigate: https://wekbench.com{{ env.CLAR_PATH }}
  - wait: 3000
  - assert: >-
      The public clarification page loads WITHOUT requiring sign-in and shows the question
      about the voltage rating with a box to type an answer.
  - type:
      text: Standard 230V single-phase is required.
      into: the answer box for the clarification question
  - type:
      text: QA Buyer
      into: the "Your name" field (placeholder "Full name")
  - click: the "Send response" button
  - wait: 3000
  - assert: A confirmation that the response was sent (a thank-you / submitted state) is shown.

  # Reload the same public link → the answer must have persisted (round-trip).
  - navigate: https://wekbench.com{{ env.CLAR_PATH }}
  - wait: 3000
  - assert: >-
      On reload the page still reflects the submitted response — a "thank you / already
      submitted" state and/or the previously entered answer is shown — confirming the
      buyer's answer round-tripped and persisted.
