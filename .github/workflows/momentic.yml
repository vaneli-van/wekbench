name: Momentic E2E

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch: {}

jobs:
  test:
    name: Momentic tests
    timeout-minutes: 20
    runs-on: ubuntu-latest
    # Authenticate against Momentic. Add MOMENTIC_API_KEY in:
    # GitHub repo → Settings → Secrets and variables → Actions.
    env:
      MOMENTIC_API_KEY: ${{ secrets.MOMENTIC_API_KEY }}
      # Credentials for the signed-in E2E tests. Set these in repo Settings → Secrets →
      # Actions to a REAL, email-confirmed, onboarding-complete account (e.g. the Western
      # Premium owner). Without them the sign-in tests cannot authenticate.
      WEKBENCH_EMAIL: ${{ secrets.WEKBENCH_EMAIL }}
      WEKBENCH_PASSWORD: ${{ secrets.WEKBENCH_PASSWORD }}
      # Dedicated test account (clean Pro workspace) used by the full coverage suite.
      WEKBENCH_EMAIL_TEST: ${{ secrets.WEKBENCH_EMAIL_TEST }}
      WEKBENCH_PASSWORD_TEST: ${{ secrets.WEKBENCH_PASSWORD_TEST }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install Momentic browsers
        run: npx --yes momentic install-browsers --all

      - name: Run Momentic tests
        # --env ci selects the inheritFromShell environment so the sign-in tests can read
        # WEKBENCH_EMAIL / WEKBENCH_PASSWORD from the job env (set from repo secrets above).
        run: npx --yes momentic run --env ci

      - name: Upload results
        if: always()
        run: npx --yes momentic results upload test-results
