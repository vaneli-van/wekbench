fileType: momentic/test/v2
id: 9f60de58-b071-4dc5-ea16-5c4b3a8e1d46
version: 1.0.24
url: https://wekbench.com/signin
description: Quote accept journey — buyer opens the link, accepts & e-signs, an order is created
# P0 money-path + buyer-facing page. Deterministic dialog + accept steps keep AI usage low.
disabled: false
retries: 1
viewport: 1920, 1080
browserType: Chromium
steps:
  - type:
      text: "{{ env.WEKBENCH_EMAIL_TEST }}"
      into: the work email field
  - type:
      text: "{{ env.WEKBENCH_PASSWORD_TEST }}"
      into: the password field
  - click: the button to continue / sign in with work email
  - waitForUrlNotToMatch: signin
  - wait: 2500

  - javascript:
      code: |-
        const stamp = Date.now();
        setVariable("QUOTE_TITLE", "QA Accept Quote " + stamp);
        setVariable("BUYER_NAME", "QA Buyer " + stamp);
        return stamp;
      saveAs: STAMP_RET

  # Create a quote (deterministic dialog fill).
  - navigate: https://wekbench.com/quotes?new=1
  - wait: 8000
  - type:
      text: "{{ env.QUOTE_TITLE }}"
      into: the quote title field (placeholder "e.g. Office laptops for Q3")
  - click: the "Select a buyer" dropdown
  - click: the "Create new buyer" option in the dropdown
  - type:
      text: "{{ env.BUYER_NAME }}"
      into: the "New buyer company name" field
  - click: the "Add" button next to the new buyer name field
  - wait: 1200
  - click: the "Create & open" button
  - wait: 3500

  - act: >-
      Add a line item with description "QA Acceptance Item", quantity 2, unit price 100.
  - wait: 2000
  - act: >-
      Send / issue this quote to the buyer so its status becomes "Sent" and the buyer
      acceptance link is active.
  - wait: 2500

  # Capture the public buyer-acceptance link.
  - javascript:
      code: |-
        const a = document.querySelector('a[href^="/q/"]');
        const path = a ? a.getAttribute('href') : '';
        setVariable("QPATH", path);
        return path;
      saveAs: QPATH_RET

  # Buyer opens the link (no login) and accepts + e-signs (deterministic).
  - navigate: https://wekbench.com{{ env.QPATH }}
  - wait: 3000
  - assert: The public quote page loads without sign-in and shows an option to accept & e-sign.
  - type:
      text: QA Buyer
      into: the "Your name" field (placeholder "Full name")
  - type:
      text: QA Buyer
      into: the signature field (placeholder "Type full name to sign")
  - click: the "Accept & sign" button
  - wait: 4000
  - assert: >-
      The quote is accepted — a confirmation is shown (accepted / signed, and an order has
      been created). No error is visible.
