fileType: momentic/test/v2
id: 7d4ebc36-9e5f-4ba3-c8d4-3a2f1e6c9b24
version: 1.0.24
url: https://wekbench.com/signin
description: Quote pricing journey — create a quote, add a priced line, totals are correct
# P0 money-path. Uses the dedicated test account (Pro). Deterministic dialog steps keep AI
# usage low; idempotent via a unique quote title + buyer name each run.
disabled: false
retries: 1
viewport: 1920, 1080
browserType: Chromium
steps:
  - type:
      text: "{{ env.WEKBENCH_EMAIL_TEST }}"
      into: the work email field
  - type:
      text: "{{ env.WEKBENCH_PASSWORD_TEST }}"
      into: the password field
  - click: the button to continue / sign in with work email
  - waitForUrlNotToMatch: signin
  - wait: 2500

  - javascript:
      code: |-
        const stamp = Date.now();
        setVariable("QUOTE_TITLE", "QA Pricing Quote " + stamp);
        setVariable("BUYER_NAME", "QA Buyer " + stamp);
        return stamp;
      saveAs: STAMP_RET

  - navigate: https://wekbench.com/quotes?new=1
  - wait: 8000
  - assert: The "New quote" dialog is open (a title field and a buyer control are shown).

  # Deterministic dialog fill (single-target clicks, not a broad act).
  - type:
      text: "{{ env.QUOTE_TITLE }}"
      into: the quote title field (placeholder "e.g. Office laptops for Q3")
  - click: the "Select a buyer" dropdown
  - click: the "Create new buyer" option in the dropdown
  - type:
      text: "{{ env.BUYER_NAME }}"
      into: the "New buyer company name" field
  - click: the "Add" button next to the new buyer name field
  - wait: 1200
  - click: the "Create & open" button
  - wait: 3500

  # Add a priced line item: 10 × 25 = 250.
  - act: >-
      On the quote builder, add a line item and set its description to "QA Test Widget",
      its quantity to 10, and its unit price to 25. Leave any discount at 0.
  - wait: 2500
  - assert: >-
      The line "QA Test Widget" shows quantity 10 and unit price 25 with a line total of
      250, and the quote subtotal is 250 (in the quote currency). The totals are
      mathematically correct and not zero.
