fileType: momentic/test/v2
id: 1e98c4d2-2155-4494-a1e6-b5869a059781
version: 1.0.24
url: https://wekbench.lovable.app/signup
description: Sign up end-to-end — provisioned inbox, confirm email, sign in, reach onboarding
# Parked: the whole flow runs (inbox → signup → confirm email → follow link); only the
# final post-confirmation landing assertion needs tuning. Re-enable once verified.
disabled: true
retries: 1
viewport: 1920, 1080
browserType: Chromium
steps:
  # 1. Provision a fresh, disposable inbox for this run.
  - javascript:
      code: |-
        const inbox = await email.create();
        setVariable("INBOX_EMAIL", inbox.email);
        setVariable("INBOX_PREFIX", inbox.prefix);
        return inbox.email;
      saveAs: INBOX_EMAIL_RET

  # 2. Fill and submit the sign-up form with that inbox address.
  - type:
      text: Test User
      into: the full name field
  - type:
      text: "{{ env.INBOX_EMAIL }}"
      into: the work email field
  - type:
      text: "Wekbench-Test-123!"
      into: the password field
  - click: the button to create the account / sign up

  # 3. Wait for the confirmation email and extract the verification link.
  - javascript:
      timeout: 70000
      code: |-
        const msg = await email.fetchLatest({
          inbox: env.INBOX_PREFIX,
          afterDate: new Date(Date.now() - 120000),
          timeout: 60000,
        });
        const body = (msg.html || "") + " " + (msg.text || "");
        const urls = body.match(/https?:\/\/[^\s"'<>]+/g) ?? [];
        const link = urls.find((u) => /token|verify|confirm|onboarding/i.test(u)) || urls[0];
        if (!link) throw new Error("No confirmation link found in the email");
        setVariable("VERIFICATION_LINK", link.replace(/&amp;/g, "&"));
        return link;
      saveAs: VERIFICATION_LINK_RET

  # 4. Open the verification link — this confirms the email.
  - navigate: "{{ env.VERIFICATION_LINK }}"
  - wait: 2500

  # 5. Go to sign-in. If a login form is shown (not auto-signed-in), log in
  #    with the new account; if already signed in this is skipped.
  - navigate: https://wekbench.lovable.app/signin
  - wait: 1500
  - if:
      checkElementVisible: a password input field on a sign-in form
      then:
        - type:
            text: "{{ env.INBOX_EMAIL }}"
            into: the work email field
        - type:
            text: "Wekbench-Test-123!"
            into: the password field
        - click: Continue with work email
        - waitForUrlNotToMatch: signin
  - wait: 4000

  # 6. Confirm the account is active and signed in.
  - assert: >-
      The new account is active and signed in — the page shows the Wekbench
      onboarding wizard (a "Welcome to Wekbench" / choose-your-role screen) or
      the dashboard. No "invalid or expired link", "email and password don't
      match", or error page is visible.
