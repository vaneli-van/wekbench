fileType: momentic/test/v2
id: 9d1c7b22-4e8a-4c1f-9b30-6a2f0c5d4e71
version: 1.0.24
url: https://wekbench.com/signin
description: Clarification journey — a vendor starts a clarification, adds a question, and sends the buyer link
# P1. Uses the dedicated test account (clean Pro workspace). Deterministic steps, no broad
# act calls — low AI cost. Idempotent: unique quote title + buyer name each run.
disabled: false
retries: 1
viewport: 1920, 1080
browserType: Chromium
steps:
  - type:
      text: "{{ env.WEKBENCH_EMAIL_TEST }}"
      into: the work email field
  - type:
      text: "{{ env.WEKBENCH_PASSWORD_TEST }}"
      into: the password field
  - click: the button to continue / sign in with work email
  - waitForUrlNotToMatch: signin
  - wait: 2500

  - javascript:
      code: |-
        const stamp = Date.now();
        setVariable("QUOTE_TITLE", "QA Clarification Quote " + stamp);
        setVariable("BUYER_NAME", "QA Buyer " + stamp);
        return stamp;
      saveAs: STAMP_RET

  # Create a fresh quote (deterministic dialog fill).
  - navigate: https://wekbench.com/quotes?new=1
  - wait: 8000
  - assert: The "New quote" dialog is open (a title field and a buyer control are shown).
  - type:
      text: "{{ env.QUOTE_TITLE }}"
      into: the quote title field (placeholder "e.g. Office laptops for Q3")
  - click: the "Select a buyer" dropdown
  - click: the "Create new buyer" option in the dropdown
  - type:
      text: "{{ env.BUYER_NAME }}"
      into: the "New buyer company name" field
  - click: the "Add" button next to the new buyer name field
  - wait: 1200
  - click: the "Create & open" button
  - wait: 3500

  # Start a clarification, add a question, send the buyer link (all deterministic).
  - click: the "Start clarification" button in the Buyer clarification section
  - wait: 1500
  - type:
      text: Please confirm the required voltage rating for this item.
      into: the input for adding a clarification question
  - click: the "Add" button next to the clarification question input
  - wait: 1200
  - click: the "Send to buyer" button
  - wait: 2500
  - assert: >-
      The clarification is now awaiting the buyer — the panel shows a status such as
      "Awaiting buyer" and a shareable buyer link with a "Copy link" control (and a
      "Preview" link). No error is visible.
